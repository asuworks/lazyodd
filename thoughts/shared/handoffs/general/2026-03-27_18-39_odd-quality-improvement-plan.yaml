blockers: []

questions:
  - Should the odd-core.bib file be duplicated into each skill's references/ dir (for portability) or shared via a single location?
  - Does vercel-labs/skills support declaring tool/MCP dependencies in skill metadata?
  - What CSL citation style does JASSS prefer? (likely APA variant)
  - Should /odd-compile be a separate skill or a flag/mode within /odd-draft?

decisions:
  - pandoc_as_backbone: "All dual-format (Markdown + LaTeX/PDF) output routes through Pandoc. The ODD stays in Markdown as source of truth. Pandoc --citeproc handles citations, pandoc-ext/diagram handles diagrams, native $...$ handles equations."
  - mermaid_primary_diagrams: "Mermaid for flowcharts/ER/sequence (widest platform support, GitHub-native rendering), Graphviz DOT for network topology diagrams only."
  - crossref_plus_citation_js: "CrossRef API (free, no auth) for DOI resolution + Citation.js CLI for formatting. Skip Zotero MCP (requires user library), SOMEF (wrong tool), codemeticulous (immature)."
  - equations_are_prompting_fix: "The CHIME odder ODD already HAS equations in LaTeX. The gap is numbered equations with cross-references (eq. 1, eq. 2), not extraction. Low-complexity fix via \\tag{N} in draft skill."
  - preserve_unique_strengths: "Confidence annotations, inline source references, knowledge gap documentation, traceability matrix are BETTER than human ODDs. Do not change these."
  - multi_agent_equal: "All improvements must work across Claude Code, Copilot, Gemini CLI, OpenCode, Codex via vercel-labs/skills standard. No agent-specific features."

findings:
  - odder_already_strong_on_equations: "Contrary to feedback, the generated ODD has LaTeX equations with $$...$$ notation. The gap is numbered equations (eq. 1, 2, 3) with cross-references, not extraction."
  - human_odd_has_4_figures: "Model interface screenshot, conceptual model flowchart (Figure 2), network visualization (Figure 3), risk function curve (Figure 4). All absent from generated ODD."
  - citation_gap_is_bibliography_not_inline: "Generated ODD references papers by name inline (Grimm et al. 2020) but has only 5 entries in References vs. 10+ in human ODD, and missing journal/volume/pages/DOI details."
  - visual_odd_vodd: "JASSS 2024 published Visual ODD (vODD) - standardized ABM visualization template with fixed positions for ODD elements. Templates on GitHub. Should inform diagram layout."
  - academix_mcp_strongest_citation_tool: "Aggregates CrossRef + Semantic Scholar + OpenAlex + DBLP + arXiv behind single MCP interface. Best option if workflow needs AI-driven literature search."
  - pandoc_ext_diagram_is_linchpin: "Single Lua filter handles Mermaid + Graphviz + PlantUML + D2 + TikZ code blocks in Markdown, renders them during PDF/LaTeX export. Critical for dual-format output."

worked:
  - "Parallel oracle agents for 3 research dimensions saved significant time (ran in background while reading ODDs)"
  - "Direct ODD comparison (human vs generated) was essential - revealed that equations were NOT missing, just unnumbered"
  - "Structured AskUserQuestion interview captured precise requirements efficiently"

